 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero section</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
 </head>
 <body>
    <header>
        <div class="navbar">
            <div class="logo"><h1>My Logo</h1></div>
            <div class="nav-link">
                <button class="humburger"><i class="ri-menu-fill"></i></button>
                
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Sevice</a></li>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">contact Us</a></li>
                </ul>
            </div>
            <button class="btn-user">Username</button>
        </div>
    </header>
    
    <section>
        <div class="text">
            <div class="headline">
                <h1>Revitalize Your<br>
                Clothes with Expert<br><span>Laundry Services!</span> </h1>
                <p>
                    From premium dry cleaning to swift wash and fold,
                    we<br> deliver care and convenience. Schedule a 
                    pickup <br>
                    and rediscover the freshness of your clothes today! 
                </p>  
            </div>
            <button class="book-btn">Book a service today!</button>
        </div>
        <div class="img">
            <img src="image.png" alt="image">
        </div>
    </section>
    
 </body>
 </html>
